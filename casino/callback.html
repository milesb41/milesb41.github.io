<script>
    // This page catches the 'code' from Discord and sends it to your API
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    async function handleLogin() {
        const res = await fetch(`https://gemrush-api.onrender.com/callback?code=${code}`);
        const data = await res.json();
        
        // Store the User ID in the browser's memory so they stay logged in
        localStorage.setItem('discord_id', data.user_id);
        
        // Send them back to the main casino dashboard
        window.location.href = "index.html";
    }
    handleLogin();
</script>
<body>Logging you in...</body>
