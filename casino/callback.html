<!DOCTYPE html>
<html>
<head>
    <title>Syncing Vault...</title>
    <style>
        body { background: #0f0f10; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #5865f2; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <div id="status">Finalizing Connection...</div>
    </div>

    <script>
        const API_URL = "https://gemrush-api.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        async function handleLogin() {
            if (!code) {
                document.getElementById('status').innerText = "No code found. Redirecting...";
                setTimeout(() => window.location.href = "index.html", 2000);
                return;
            }

            try {
                // This sends the code to your Render API to get your ID
                const response = await fetch(`${API_URL}/callback?code=${code}`);
                const data = await response.json();

                if (data.user_id) {
                    // ✅ SUCCESS: Store your info in the browser
                    localStorage.setItem('discord_id', data.user_id);
                    localStorage.setItem('discord_user', data.username);
                    
                    document.getElementById('status').innerText = "Welcome, " + data.username + "!";
                    // Send you to the dashboard
                    setTimeout(() => window.location.href = "index.html", 1000);
                } else {
                    document.getElementById('status').innerText = "Session Error. Try again.";
                    console.error("Login Error:", data);
                }
            } catch (err) {
                document.getElementById('status').innerText = "API is busy. Retrying...";
                console.error(err);
            }
        }

        handleLogin();
    </script>
</body>
</html>
