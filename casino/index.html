<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GemRush | Vault Access</title>
    <style>
        :root { --bg: #0f0f10; --card: #1c1c1e; --accent: #5865f2; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #333; width: 320px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h2 { letter-spacing: 2px; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #2c2c2e; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background: #4752c4; }
        #dashboard { display: none; }
        .balance { font-size: 3rem; font-weight: bold; color: #00d2ff; margin: 20px 0; }
        .error { color: #ff453a; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h2>GEMRUSH</h2>
        <p style="color: #8e8e93; font-size: 0.85rem; margin-bottom: 25px;">Use `/createaccount` in Discord</p>
        
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="performLogin()" id="loginBtn">Login to Vault</button>
        <p id="errorMsg" class="error">Invalid username or password</p>
    </div>

    <div id="dashboard" class="card">
        <h3 id="welcomeMsg" style="color: #8e8e93;">Welcome Back</h3>
        <div id="balanceNum" class="balance">0</div>
        <div style="display: flex; justify-content: space-around; font-size: 0.8rem; color: #32d74b;">
            <div>PROFIT: <span id="profitNum">+0</span></div>
            <div style="color: #ff9f0a;">WAGERED: <span id="wagerNum">0</span></div>
        </div>
        <button onclick="logout()" style="background: transparent; border: 1px solid #444; margin-top: 30px;">Sign Out</button>
    </div>

<script>
    // 1. Point this to your actual Render URL
    const API_URL = "https://gemrush-api.onrender.com";

    async function performLogin() {
        const username = document.getElementById('userInput').value;
        const password = document.getElementById('passInput').value;
        const btn = document.getElementById('loginBtn');
        const error = document.getElementById('errorMsg');

        if (!username || !password) {
            error.innerText = "Please enter both fields.";
            error.style.display = "block";
            return;
        }

        btn.innerText = "Authenticating...";
        btn.disabled = true;
        error.style.display = "none";

        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok && data.status === "success") {
                // ✅ Save the session
                localStorage.setItem('gem_uid', data.user_id);
                localStorage.setItem('gem_name', data.username);
                
                // ✅ Move to the next page (Dashboard)
                loadDashboard();
            } else {
                error.innerText = data.detail || "Invalid Credentials";
                error.style.display = "block";
                btn.innerText = "Login to Vault";
                btn.disabled = false;
            }
        } catch (err) {
            console.error("Login Error:", err);
            error.innerText = "API Offline - check Render logs";
            error.style.display = "block";
            btn.innerText = "Login to Vault";
            btn.disabled = false;
        }
    }

    async function loadDashboard() {
        const uid = localStorage.getItem('gem_uid');
        const name = localStorage.getItem('gem_name');
        
        if (!uid) return;

        // Swap the views
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcomeMsg').innerText = `Welcome, ${name}`;

        try {
            // Fetch the same data the /balance command sees
            const res = await fetch(`${API_URL}/balance/${uid}`);
            const data = await res.json();
            
            // Update the UI with commas for big numbers
            document.getElementById('balanceNum').innerText = `💎 ${data.balance.toLocaleString()}`;
            document.getElementById('profitNum').innerText = `${data.profit >= 0 ? '+' : ''}${data.profit.toLocaleString()}`;
            document.getElementById('wagerNum').innerText = data.wagered.toLocaleString();
        } catch (err) {
            console.error("Balance Fetch Error:", err);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.reload();
    }

    // Auto-login if a session exists
    window.onload = () => {
        if (localStorage.getItem('gem_uid')) {
            loadDashboard();
        }
    };
</script>
</body>
</html>
