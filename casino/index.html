<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemRush | Casino Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f10;
            --card: #1c1c1e;
            --accent: #5865f2; /* Discord Blurple */
            --green: #32d74b;
            --text-dim: #8e8e93;
        }

        body { 
            background: var(--bg); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* LOGIN SCREEN */
        #auth-section {
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .login-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            background: #4752c4;
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
        }

        /* DASHBOARD SCREEN */
        #dashboard {
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .container { 
            background: var(--card); 
            border: 1px solid #3a3a3c; 
            border-radius: 28px; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.7); 
            width: 360px; 
        }

        .user-badge {
            background: #2c2c2e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; margin: 0; }
        
        .balance { 
            font-size: 3.8rem; 
            font-weight: 800; 
            color: #00d2ff; 
            margin: 10px 0; 
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(0,210,255,0.2);
        }

        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-top: 25px; 
            border-top: 1px solid #2c2c2e; 
            padding-top: 25px; 
        }

        .stat-label { font-size: 0.7rem; color: #636366; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: 600; color: var(--green); }

        .sync-text { font-size: 0.75rem; color: #48484a; margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }

        .logout { margin-top: 20px; color: #ff453a; font-size: 0.8rem; cursor: pointer; opacity: 0.6; }
        .logout:hover { opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-section">
        <img src="https://cdn.prod.website-files.com/6257adef93867e3d0390e3d6/63173058cbf6b306f9760773_Logo.png" width="80" style="margin-bottom: 20px; filter: grayscale(1) brightness(2);">
        <h2 style="margin-bottom: 30px; font-weight: 800;">GEMRUSH VAULT</h2>
        <button class="login-btn" onclick="startLogin()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2758-3.68-.2758-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1971.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189z"/></svg>
            Login with Discord
        </button>
    </div>

    <div id="dashboard">
        <div class="container">
            <div class="user-badge" id="username">Player</div>
            <h1>Your Gems</h1>
            <div id="balance" class="balance">0</div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Total Profit</div>
                    <div id="profit" class="stat-value">+0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Wagered</div>
                    <div id="wagered" class="stat-value" style="color: #ff9f0a;">0</div>
                </div>
            </div>

            <div class="sync-text">
                <span class="dot"></span> Live Sync Active
            </div>
            <div class="logout" onclick="logout()">Sign Out</div>
        </div>
    </div>

    <script>
        const API_URL = "https://gemrush-api.onrender.com";

        // 1. SEND TO DISCORD LOGIN
        async function startLogin() {
            try {
                const response = await fetch(`${API_URL}/login`);
                const data = await response.json();
                window.location.href = data.url;
            } catch (err) {
                alert("API is waking up... try again in 10 seconds.");
            }
        }

        // 2. FETCH LIVE DATA
        async function loadStats() {
            const userId = localStorage.getItem('discord_id');
            const username = localStorage.getItem('discord_user');
            
            if (!userId) return;

            // Show dashboard, hide login
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('username').innerText = username || "Player";

            try {
                const response = await fetch(`${API_URL}/balance/${userId}`);
                const data = await response.json();
                
                document.getElementById('balance').innerText = `💎${data.balance.toLocaleString()}`;
                document.getElementById('profit').innerText = `+${data.profit.toLocaleString()}`;
                document.getElementById('wagered').innerText = data.wagered.toLocaleString();
            } catch (err) {
                console.log("Reconnecting...");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // Check if logged in on start
        loadStats();
        // Refresh stats every 3 seconds
        setInterval(loadStats, 3000);
    </script>
</body>
</html>
