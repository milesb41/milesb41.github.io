<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GemRush | Casino</title>
    <style>
        body { background: #0f0f10; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1c1c1e; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 300px; }
        .btn { background: #5865f2; color: white; padding: 15px 25px; border-radius: 10px; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 20px; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="auth-section">
        <h1>GEMRUSH</h1>
        <a href="https://gemrush-api.onrender.com/login" class="btn" id="login-link">Login with Discord</a>
    </div>

    <div id="dashboard">
        <div class="card">
            <h2 id="user-display">Welcome</h2>
            <div id="balance" style="font-size: 2.5rem; color: #00d2ff;">💎0</div>
            <p id="logout" style="color: red; cursor: pointer; margin-top: 20px;" onclick="logout()">Sign Out</p>
        </div>
    </div>

    <script>
        async function init() {
            const userId = localStorage.getItem('discord_id');
            if (userId) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-display').innerText = localStorage.getItem('discord_user');
                
                const res = await fetch(`https://gemrush-api.onrender.com/balance/${userId}`);
                const data = await res.json();
                document.getElementById('balance').innerText = `💎${data.balance.toLocaleString()}`;
            }
        }

        function logout() { localStorage.clear(); window.location.reload(); }
        init();
    </script>
</body>
</html>
