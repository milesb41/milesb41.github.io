<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemRush | Casino Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f10; --card: #1c1c1e; --accent: #5865f2; --green: #32d74b; --text-dim: #8e8e93; }
        body { background: var(--bg); color: #ffffff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #auth-section { text-align: center; }
        .login-btn { background: var(--accent); color: white; border: none; padding: 16px 32px; font-weight: 600; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .login-btn:hover { transform: translateY(-2px); background: #4752c4; }
        #dashboard { display: none; }
        .container { background: var(--card); border: 1px solid #3a3a3c; border-radius: 28px; padding: 40px; text-align: center; width: 340px; }
        .balance { font-size: 3.5rem; font-weight: 800; color: #00d2ff; margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; border-top: 1px solid #2c2c2e; padding-top: 25px; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: 600; color: var(--green); }
        .logout { margin-top: 20px; color: #ff453a; font-size: 0.8rem; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="auth-section">
        <h2 style="margin-bottom: 20px;">GEMRUSH VAULT</h2>
        <button class="login-btn" onclick="startLogin()">Login with Discord</button>
    </div>

    <div id="dashboard">
        <div class="container">
            <div id="username" style="color:var(--text-dim); margin-bottom:10px;">Player</div>
            <h1>Your Gems</h1>
            <div id="balance" class="balance">0</div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">Profit</div><div id="profit" class="stat-value">+0</div></div>
                <div class="stat-box"><div class="stat-label">Wagered</div><div id="wagered" class="stat-value" style="color:#ff9f0a;">0</div></div>
            </div>
            <div class="logout" onclick="logout()">Sign Out</div>
        </div>
    </div>

    <script>
        const API_URL = "https://gemrush-api.onrender.com";

        async function startLogin() {
            const btn = document.querySelector('.login-btn');
            btn.innerText = "Connecting...";
            try {
                const response = await fetch(`${API_URL}/login`);
                const data = await response.json();
                if (data.url) window.location.href = data.url;
            } catch (err) { alert("API is waking up. Please wait 10 seconds."); btn.innerText = "Login with Discord"; }
        }

        async function loadStats() {
            const userId = localStorage.getItem('discord_id');
            if (!userId) return;

            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('username').innerText = localStorage.getItem('discord_user') || "Player";

            try {
                const res = await fetch(`${API_URL}/balance/${userId}`);
                const data = await res.json();
                document.getElementById('balance').innerText = `💎${data.balance.toLocaleString()}`;
                document.getElementById('profit').innerText = `+${data.profit.toLocaleString()}`;
                document.getElementById('wagered').innerText = data.wagered.toLocaleString();
            } catch (err) { console.log("Syncing..."); }
        }

        function logout() { localStorage.clear(); window.location.reload(); }
        loadStats();
        setInterval(loadStats, 5000);
    </script>
</body>
</html>
